# Zune Configuration

[workspace]
# `zune test run` resolves to test/run.luau
test_path = "test"

# Debug settings
[runtime.debug]
detailed_error = true

# Compiler settings
[runtime.luau.options]
debug_level = 2
optimization_level = 1
native_code_gen = true

# Formatter settings
[resolvers.formatter]
max_depth = 4
use_color = true
table_address = true
recursive_Table = false
buffer_max_display = 48
